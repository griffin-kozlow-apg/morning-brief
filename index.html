<style>
:root{color-scheme:light;
--bg:#f5f5f7;--card:#ffffff;--ink:#1d1d1f;--mut:#6e6e73;--line:#e5e5ea;
--grn:#1a8f5a;--red:#d1342f;--blue:#0a6cff;--amber:#b5761b;
--tagP:#eaf2ff;--tagPc:#0a5bd6;--tagM:#fff2e0;--tagMc:#b5761b;--tagW:#efeaff;--tagWc:#6b46d9;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);
font:16px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
padding:0 0 40px;max-width:560px;margin:0 auto;-webkit-font-smoothing:antialiased}
/* ---------- lock screen ---------- */
#lock{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:24px 24px calc(24px + env(safe-area-inset-bottom));text-align:center}
#lock img{width:76px;height:76px;border-radius:18px;box-shadow:0 6px 20px rgba(10,19,48,.25);margin-bottom:18px}
#lock h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
#lock .sub{color:var(--mut);font-size:14px;margin:4px 0 22px}
.field{width:100%;max-width:320px}
#pw{width:100%;padding:14px 16px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:center;-webkit-appearance:none}
#pw:focus{outline:none;border-color:var(--blue)}
.btn{width:100%;max-width:320px;padding:14px;font-size:16px;font-weight:650;border:none;border-radius:12px;margin-top:10px;cursor:pointer;-webkit-appearance:none}
.btn.primary{background:var(--ink);color:#fff}
.btn.faceid{background:#0a6cff;color:#fff;display:none;align-items:center;justify-content:center;gap:8px}
.btn.ghost{background:transparent;color:var(--blue);font-weight:600;margin-top:14px}
.err{color:var(--red);font-size:13.5px;font-weight:600;margin-top:12px;min-height:18px}
.hint{color:var(--mut);font-size:12px;margin-top:18px;max-width:300px;line-height:1.5}
/* ---------- brief (post-unlock) ---------- */
#app{display:none}
.wrap{padding:calc(20px + env(safe-area-inset-top)) 16px 0}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--mut)}
h1.title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin:2px 0 2px}
.date{color:var(--mut);font-size:14px;margin-bottom:16px}
.lockbtn{float:right;font-size:12px;font-weight:600;color:var(--mut);background:#eef0f2;border:none;border-radius:20px;padding:5px 11px;cursor:pointer;margin-top:4px}
.snap{background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:22px}
.snap .val{font-size:32px;font-weight:700;letter-spacing:-.8px;font-variant-numeric:tabular-nums}
.snap .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;align-items:center}
.pill{font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;font-variant-numeric:tabular-nums}
.pill.up{background:#e7f6ee;color:var(--grn)}.pill.dn{background:#fdeceb;color:var(--red)}.pill.mut{background:#eef0f2;color:var(--mut)}
.snap .lbl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.idx{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.idx .chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 13px;min-width:104px}
.idx .n{font-size:12px;color:var(--mut);font-weight:600}.idx .p{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
.idx .d{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:1px}
.sec{font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--mut);margin:0 4px 12px}
.item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 15px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.item .top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.num{flex:0 0 auto;width:24px;height:24px;border-radius:8px;background:var(--ink);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.tag{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.tag.P{background:var(--tagP);color:var(--tagPc)}.tag.M{background:var(--tagM);color:var(--tagMc)}.tag.W{background:var(--tagW);color:var(--tagWc)}
.item h3{font-size:16px;font-weight:650;letter-spacing:-.2px;line-height:1.35;margin-bottom:5px}
.item p{font-size:14.5px;color:#3a3a3c;line-height:1.5}.item .tk{font-weight:650;color:var(--ink)}
.up-t{color:var(--grn);font-weight:650}.dn-t{color:var(--red);font-weight:650}
.foot{color:var(--mut);font-size:12px;line-height:1.5;text-align:center;padding:18px 20px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);margin-top:24px}
.foot .big{font-weight:600;color:#48484a}
/* face id enable prompt */
#faceEnroll{display:none;background:#eef4ff;border:1px solid #d5e3ff;border-radius:14px;padding:14px;margin:0 0 18px;text-align:center}
#faceEnroll p{font-size:13.5px;color:#274b8c;margin-bottom:10px}
#faceEnroll button{background:#0a6cff;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
#faceEnroll .no{background:transparent;color:#6e6e73;margin-left:6px}
</style>
</head>

  <h1>Morning Brief</h1>
  <div class="sub">Enter your passphrase to unlock</div>
  <div class="field">
    <input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="Passphrase" enterkeyhint="go">
    <button class="btn primary" id="unlock">Unlock</button>
    <button class="btn faceid" id="faceUnlock">ð Unlock with Face ID</button>
    <button class="btn ghost" id="forget" style="display:none">Use passphrase instead</button>
  </div>
  <div class="err" id="err"></div>
  <div class="hint">Your data is end-to-end encrypted. Only this passphrase can decrypt it â it never leaves your device and isn't stored anywhere online.</div>
</section>

<script>
const $ = (id) => document.getElementById(id);
const b64d = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const b64e = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const PRF_SALT = new TextEncoder().encode('morning-brief-prf-v1');
const LS_KEY = 'mb_faceid_v1';

async function deriveKey(pw, salt, iter) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: iter, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}
async function decryptBrief(pw) {
  const p = JSON.parse($('payload').textContent);
  const key = await deriveKey(pw, b64d(p.salt), p.iter);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(p.iv) }, key, b64d(p.ct));
  return new TextDecoder().decode(pt);
}
function reveal(html) {
  $('app').innerHTML = html;
  $('lock').style.display = 'none';
  $('app').style.display = 'block';
  maybeOfferFaceEnroll();
  window.scrollTo(0, 0);
}
async function doPasswordUnlock() {
  const pw = $('pw').value;
  if (!pw) return;
  $('err').textContent = '';
  $('unlock').textContent = 'Unlockingâ¦';
  try {
    const html = await decryptBrief(pw);
    window.__pw = pw;               // held in memory only, for optional Face ID enroll
    reveal(html);
  } catch (e) {
    $('err').textContent = 'Wrong passphrase. Try again.';
    $('unlock').textContent = 'Unlock';
  }
}

/* ---------- Face ID via WebAuthn PRF ---------- */
function faceIdSupported() { return !!(window.PublicKeyCredential && navigator.credentials && location.protocol === 'https:'); }
function faceIdEnrolled() { return !!localStorage.getItem(LS_KEY); }

async function getPRF(credId) {
  const assn = await navigator.credentials.get({ publicKey: {
    challenge: crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials: [{ type: 'public-key', id: credId }],
    userVerification: 'required',
    timeout: 60000,
    extensions: { prf: { eval: { first: PRF_SALT } } }
  }});
  const r = assn.getClientExtensionResults();
  if (!r.prf || !r.prf.results || !r.prf.results.first) throw new Error('prf-unavailable');
  return new Uint8Array(r.prf.results.first);
}
async function aesKeyFromRaw(raw) {
  return crypto.subtle.importKey('raw', raw, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
}
async function enrollFaceID(pw) {
  const cred = await navigator.credentials.create({ publicKey: {
    challenge: crypto.getRandomValues(new Uint8Array(32)),
    rp: { name: 'Morning Brief', id: location.hostname },
    user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'griffin', displayName: 'Griffin' },
    pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
    authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required', residentKey: 'required' },
    timeout: 60000,
    extensions: { prf: {} }
  }});
  const credId = cred.rawId;
  const secret = await getPRF(credId);                 // triggers Face ID once to read PRF
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await aesKeyFromRaw(secret);
  const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(pw));
  localStorage.setItem(LS_KEY, JSON.stringify({ credId: b64e(credId), enc: b64e(enc), iv: b64e(iv) }));
}
async function unlockWithFaceID() {
  const st = JSON.parse(localStorage.getItem(LS_KEY));
  const secret = await getPRF(b64d(st.credId));
  const key = await aesKeyFromRaw(secret);
  const pwBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(st.iv) }, key, b64d(st.enc));
  const pw = new TextDecoder().decode(pwBuf);
  const html = await decryptBrief(pw);
  reveal(html);
}
function maybeOfferFaceEnroll() {
  if (!faceIdSupported() || faceIdEnrolled() || !window.__pw) return;
  const box = document.createElement('div');
  box.id = 'faceEnroll';
  box.style.display = 'block';
  box.innerHTML = '<p>Unlock faster next time with Face ID?</p>' +
    '<button id="enrollYes">Enable Face ID</button><button class="no" id="enrollNo">Not now</button>';
  const wrap = $('app').querySelector('.wrap') || $('app');
  wrap.insertBefore(box, wrap.firstChild);
  $('enrollYes').onclick = async () => {
    box.querySelector('p').textContent = 'Setting upâ¦';
    try { await enrollFaceID(window.__pw); box.innerHTML = '<p>â Face ID enabled for this device.</p>'; setTimeout(() => box.remove(), 2500); }
    catch (e) { box.innerHTML = '<p>Face ID setup not available on this device/browser. Passphrase still works.</p>'; setTimeout(() => box.remove(), 4000); }
  };
  $('enrollNo').onclick = () => box.remove();
}

/* ---------- wire up ---------- */
$('unlock').onclick = doPasswordUnlock;
$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doPasswordUnlock(); });

(function init() {
  if (faceIdSupported() && faceIdEnrolled()) {
    const fb = $('faceUnlock');
    fb.style.display = 'flex';
    fb.onclick = async () => {
      $('err').textContent = '';
      try { await unlockWithFaceID(); }
      catch (e) { $('err').textContent = 'Face ID cancelled or unavailable â use your passphrase.'; }
    };
    $('forget').style.display = 'block';
    $('forget').onclick = () => { $('faceUnlock').style.display = 'none'; $('forget').style.display = 'none'; $('pw').focus(); };
    // auto-prompt Face ID on load
    setTimeout(() => fb.click(), 400);
  } else {
    $('pw').focus();
  }
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
